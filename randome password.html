<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Gen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .main {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #3498db;
        }
        
        .box {
            background-color: #2980b9;
            padding: 15px;
            width: 400px;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgb(0, 0, 0, 50%);
            margin-top: 10px;
        }
        
        #passbox {
            width: 100%;
            border-radius: 5px;
            color: #3498db;
            background-color: white;
            display: block;
            padding: 10px;
            font-size: 30px;
        }
        
        .row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            color: white;
            font-size: 20px;
        }
        
        #btn {
            width: 100%;
            padding: 10px;
            color: white;
            background-color: #34495e;
            outline: 0;
            border: 0;
            font-size: 20px;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="box">
            <span id="passbox">testing</span>

            <!--password lenght-->

            <div class="row">
                <label for="password-lenght">
                    <div class="left">
                        Password Lenght
                    </div>
                </label>
                <div class="right">
                    <input type="number" name="" id="totalchar" min="2" max="30" value="10">
                </div>
            </div>

            <!--uppercase-->

            <div class="row">
                <label for="upper-case">
                    <div class="left">
                        Contains UpperCase
                    </div>
                </label>
                <div class="right">
                    <input type="checkbox" name="" id="upper-case" checked>
                </div>
            </div>

            <!--lowercase-->

            <div class="row">
                <label for="lower-case">
                    <div class="left">
                        Contains LowerCase
                    </div>
                </label>
                <div class="right">
                    <input type="checkbox" name="" id="lower-case">
                </div>
            </div>

            <!--lnumbers-->

            <div class="row">
                <label for="numbers">
                    <div class="left">
                        Contains Numbers
                    </div>
                </label>
                <div class="right">
                    <input type="checkbox" name="" id="numbers">
                </div>
            </div>

            <!--symbols-->

            <div class="row">
                <label for="symbols">
                    <div class="left">
                        Contains Symbols
                    </div>
                </label>
                <div class="right">
                    <input type="checkbox" name="" id="symbols">
                </div>
            </div>

            <!--button-->

            <div class="row">
                <button id="btn">
                    Generator
                </button>
            </div>


        </div>
    </div>

</body>
<script>
    const uppercase = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const lowercase = "abcdefghijklmnopqrstuvwxyz";
    const numbers = "0123456789";
    const symbols = "~!@#$%^&*()_+|?/";

    //selectors
    const passbox = document.getElementById("passbox")
    const upperinput = document.getElementById("upper-case")
    const lowerinput = document.getElementById("lower-case")
    const numberinput = document.getElementById("numbers")
    const symbolsinput = document.getElementById("symbols")
    const totalchar = document.getElementById("totalchar")

    //function to get random character
    const getrandomedata = (dataset) => {
        return dataset[Math.floor(Math.random() * dataset.length)]
    }

    //generate password
    const generatepassword = (password = "") => {
        if (upperinput.checked) password += getrandomedata(uppercase)
        if (lowerinput.checked) password += getrandomedata(lowercase)
        if (numberinput.checked) password += getrandomedata(numbers)
        if (symbolsinput.checked) password += getrandomedata(symbols)

        if (password.length < totalchar.value) {
            return generatepassword(password)
        }

        passbox.innerText = password.slice(0, totalchar.value);
    }

    //initial generate
    generatepassword();

    //button click
    document.getElementById("btn").addEventListener("click", function() {
        generatepassword();
    })
</script>

</html>
